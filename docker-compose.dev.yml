networks:
    app-network:
        driver: bridge

services:
    database:
        image: postgres:15-alpine
        container_name: postgres_db_dev
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - ./docker/sql/postgres_data_dev:/var/lib/postgresql/data:Z
        networks:
            - app-network

    frontend:
        build:
            context: .
            dockerfile: docker/Dockerfile.frontend.dev
        container_name: frontend_dev
        user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
        volumes:
            - ./frontend:/app
        ports:
            - "5173:5173"
        environment:
            - CHOKIDAR_USEPOLLING=true
        networks:
            - app-network

    backend:
        build:
            context: .
            dockerfile: docker/Dockerfile.backend.dev
        container_name: backend_dev
        user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
        volumes:
            - ./backend:/app
            - /app/node_modules
        ports:
            - "${API_PORT:-3000}:3000"
        environment:
            DB_HOST: database
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            JWT_SECRET: ${JWT_SECRET}
            API_PORT: 3000
            CORS_ORIGIN: http://localhost:5173
            CHOKIDAR_USEPOLLING: true
        depends_on:
            - database
        networks:
            - app-network

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin_dev
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PG_ADMIN_USER}
            PGADMIN_DEFAULT_PASSWORD: ${PG_ADMIN_PASSWD}
        ports:
            - "${PGADMIN_PORT:-5050}:80"
        depends_on:
            - database
        networks:
            - app-network
