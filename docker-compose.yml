networks:
    app-network:
        driver: bridge

services:
    database:
        image: postgres:15-alpine
        container_name: postgres_db
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data:Z
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
            interval: 5s
            timeout: 5s
            retries: 10

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PG_ADMIN_USER}
            PGADMIN_DEFAULT_PASSWORD: ${PG_ADMIN_PASSWD}
        ports:
            - '${PGADMIN_PORT:-5050}:80'
        depends_on:
            database:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped

    backend:
        build:
            context: .
            dockerfile: docker/Dockerfile.backend
            target: ${NODE_ENV:-development}
        container_name: node_backend
        volumes:
            - ./backend:/app
            - /app/node_modules
        environment:
            DB_HOST: database
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            JWT_SECRET: ${JWT_SECRET}
            REFRESH_SECRET: ${REFRESH_SECRET}
            API_PORT: ${API_PORT:-3000}
            CORS_ORIGIN: ${CORS_ORIGIN}
            NODE_ENV: ${NODE_ENV:-development}
        depends_on:
            database:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped
        ports:
            - '${API_PORT:-3000}:${API_PORT:-3000}'

    frontend:
        profiles: ['dev']
        build:
            context: .
            dockerfile: docker/Dockerfile.frontend
            target: development
        container_name: frontend_dev
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        environment:
            CHOKIDAR_USEPOLLING: 'true'
        networks:
            - app-network

    apache:
        profiles: ['prod']
        build:
            context: .
            dockerfile: docker/Dockerfile.frontend
            target: production
        container_name: apache_frontend
        volumes:
            - ./docker/apache/apache2.conf:/etc/apache2/apache2.conf:ro
            - ./docker/apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf:ro
            - ./docker/apache/security.conf:/etc/apache2/conf-enabled/security.conf:ro
        ports:
            - '80:80'
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - app-network
        restart: unless-stopped

volumes:
    postgres_data:
